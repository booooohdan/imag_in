name: imag_in
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=3.11.4 <4.0.0'
  flutter: '>=3.41.6'

dependencies:
#Flutter Core
  flutter:
    sdk: flutter
  async: 2.13.1
#State management
  go_router: 17.1.0
  provider: 6.1.5+1
#UI
  extended_image: 10.0.1
  font_awesome_flutter: 11.0.0
  google_fonts: 8.0.2
  loading_animation_widget: 1.3.0
  shimmer: 3.0.0
#Utility
  connectivity_plus: 7.0.0
  image_picker: 1.2.1
  json_annotation: 4.11.0
  dio: ^5.9.2
  shared_preferences: ^2.5.5


dev_dependencies:
#Testing
  flutter_test:
    sdk: flutter
#Icons & Splash Screen
  flutter_launcher_icons: 0.14.4
  flutter_native_splash: 2.4.7
#Utilities
  build_runner: 2.13.1
  flutter_lints: 6.0.0
  json_serializable: 6.13.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/

# dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon.png"

# dart run flutter_native_splash:create
flutter_native_splash:
  color: "#009688"
  image: assets/icon_transparent.png
  android_12:
    color: "#009688"
    image: assets/icon_transparent.png
  fullscreen: true
  android: true
  ios: true
